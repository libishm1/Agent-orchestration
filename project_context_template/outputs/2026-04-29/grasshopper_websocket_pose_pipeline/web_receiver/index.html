<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UR10e Pose Receiver</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --panel: #ffffff;
      --ink: #1c252c;
      --muted: #68747f;
      --line: #d8dee4;
      --accent: #14746f;
      --accent-2: #b45309;
      --bad: #b42318;
      --good: #087443;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
    }
    main {
      display: grid;
      grid-template-columns: minmax(300px, 420px) 1fr;
      gap: 18px;
      padding: 18px;
      max-width: 1280px;
      margin: 0 auto;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: #33414c;
      text-transform: uppercase;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    input {
      width: min(340px, 100%);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      min-height: 36px;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      white-space: nowrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9aa6b2;
    }
    .dot.on { background: var(--good); }
    .dot.bad { background: var(--bad); }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
      background: #fbfcfd;
    }
    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .value {
      font-variant-numeric: tabular-nums;
      font-size: 18px;
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    canvas {
      display: block;
      width: 100%;
      height: 360px;
      background: #eef2f5;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }
    pre {
      margin: 0;
      padding: 14px;
      min-height: 220px;
      max-height: 380px;
      overflow: auto;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .log {
      padding: 10px 14px 14px;
      max-height: 260px;
      overflow: auto;
    }
    .log-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #eef1f4;
      font-variant-numeric: tabular-nums;
    }
    .log-row span:first-child { color: var(--muted); }
    @media (max-width: 860px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; padding: 12px; }
      .metrics { grid-template-columns: 1fr; }
      input { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>UR10e Pose Receiver</h1>
    <div class="controls">
      <input id="uri" value="ws://127.0.0.1:8765" aria-label="WebSocket URI">
      <button id="connect" class="primary">Connect</button>
      <button id="disconnect" disabled>Disconnect</button>
      <button id="sample">Send Sample</button>
      <span class="status"><span id="dot" class="dot"></span><span id="status">Idle</span></span>
    </div>
  </header>
  <main>
    <section>
      <div class="section-head">
        <h2>Pose</h2>
        <span id="frame" class="status">frame: none</span>
      </div>
      <div class="metrics">
        <div class="metric"><div class="label">X m</div><div id="x" class="value">0.000</div></div>
        <div class="metric"><div class="label">Y m</div><div id="y" class="value">0.000</div></div>
        <div class="metric"><div class="label">Z m</div><div id="z" class="value">0.000</div></div>
        <div class="metric"><div class="label">RX rad</div><div id="rx" class="value">0.000</div></div>
        <div class="metric"><div class="label">RY rad</div><div id="ry" class="value">0.000</div></div>
        <div class="metric"><div class="label">RZ rad</div><div id="rz" class="value">0.000</div></div>
      </div>
      <canvas id="plot" width="900" height="520"></canvas>
    </section>
    <section>
      <div class="section-head">
        <h2>Message</h2>
        <span id="source" class="status">source: none</span>
      </div>
      <pre id="raw">{}</pre>
      <div class="section-head">
        <h2>Events</h2>
      </div>
      <div id="log" class="log"></div>
    </section>
  </main>
  <script>
    const state = {
      ws: null,
      pose: [0, 0, 0],
      rot: [0, 0, 0],
      connected: false
    };

    const el = id => document.getElementById(id);
    const ids = ["x", "y", "z", "rx", "ry", "rz"];

    function setStatus(text, mode) {
      el("status").textContent = text;
      el("dot").className = "dot" + (mode ? " " + mode : "");
    }

    function addLog(text) {
      const row = document.createElement("div");
      row.className = "log-row";
      row.innerHTML = `<span>${new Date().toLocaleTimeString()}</span><span>${text}</span>`;
      el("log").prepend(row);
    }

    function updateButtons() {
      el("connect").disabled = state.connected;
      el("disconnect").disabled = !state.connected;
    }

    function fmt(value) {
      return Number(value).toFixed(4);
    }

    function drawPlot() {
      const canvas = el("plot");
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = "#eef2f5";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#c8d1da";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 10; i++) {
        const x = i * w / 10;
        const y = i * h / 10;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }

      const cx = w * 0.5;
      const cy = h * 0.55;
      const scale = 180;
      const px = cx + state.pose[0] * scale;
      const py = cy - state.pose[1] * scale;
      const radius = Math.max(7, 12 + state.pose[2] * 22);

      ctx.strokeStyle = "#4b5b66";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx - 12, cy); ctx.lineTo(cx + 12, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy + 12); ctx.stroke();

      ctx.strokeStyle = "#14746f";
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke();

      ctx.fillStyle = "#b45309";
      ctx.beginPath(); ctx.arc(px, py, radius, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = "#1c252c";
      ctx.font = "20px system-ui, sans-serif";
      ctx.fillText(`x ${fmt(state.pose[0])}  y ${fmt(state.pose[1])}  z ${fmt(state.pose[2])}`, 24, 34);
    }

    function applyPose(message) {
      const position = message.pose.position;
      const rotation = message.pose.rotation_vector;
      state.pose = position;
      state.rot = rotation;
      [...position, ...rotation].forEach((value, index) => {
        el(ids[index]).textContent = fmt(value);
      });
      el("frame").textContent = `frame: ${message.frame_id || "base"}`;
      el("source").textContent = `source: ${message.source || "unknown"}`;
      el("raw").textContent = JSON.stringify(message, null, 2);
      addLog(`pose ${position.map(fmt).join(", ")}`);
      drawPlot();
    }

    function connect() {
      const uri = el("uri").value.trim();
      const ws = new WebSocket(uri);
      state.ws = ws;
      setStatus("Connecting", "");

      ws.addEventListener("open", () => {
        state.connected = true;
        setStatus("Connected", "on");
        updateButtons();
        addLog("connected");
      });
      ws.addEventListener("message", event => {
        const message = JSON.parse(event.data);
        if (message.type === "robot_pose") applyPose(message);
        if (message.type === "pose_ack") addLog("ack accepted");
        if (message.type === "pose_error") addLog(`error ${message.error}`);
      });
      ws.addEventListener("close", () => {
        state.connected = false;
        state.ws = null;
        setStatus("Closed", "");
        updateButtons();
        addLog("closed");
      });
      ws.addEventListener("error", () => {
        setStatus("Error", "bad");
        addLog("socket error");
      });
    }

    function disconnect() {
      if (state.ws) state.ws.close();
    }

    function sendSample() {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        connect();
        setTimeout(sendSample, 350);
        return;
      }
      state.ws.send(JSON.stringify({
        type: "robot_pose",
        schema: "cm-itad.ur10e.pose.v1",
        timestamp: new Date().toISOString(),
        source: "web_receiver_sample",
        frame_id: "base",
        units: { linear: "m", angular: "rad" },
        pose: {
          position: [0.42, -0.18, 0.36],
          rotation_vector: [0, 3.141593, 0]
        },
        speed: 0.1,
        acceleration: 0.1
      }));
    }

    el("connect").addEventListener("click", connect);
    el("disconnect").addEventListener("click", disconnect);
    el("sample").addEventListener("click", sendSample);
    drawPlot();
  </script>
</body>
</html>
